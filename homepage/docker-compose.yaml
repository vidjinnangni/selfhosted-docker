
services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.4.1@sha256:39af267c9404a2af54f534a319440a9f1d3f8544181faa62223b6412e0cf00f7
    container_name: homepage
    volumes:
      - ./config:/app/config  # You can adapt the path to whatever suits you.
      - /var/run/docker.sock:/var/run/docker.sock  # optional: enables Docker integration
    ports:
      - 3000:3000
    restart: unless-stopped